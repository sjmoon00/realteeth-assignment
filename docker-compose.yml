services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: assignment
      MYSQL_USER: assignment
      MYSQL_PASSWORD: assignment
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/assignment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: assignment
      SPRING_DATASOURCE_PASSWORD: assignment
      MOCK_WORKER_CANDIDATE_NAME: ${MOCK_WORKER_CANDIDATE_NAME}
      MOCK_WORKER_EMAIL: ${MOCK_WORKER_EMAIL}
    depends_on:
      db:
        condition: service_healthy
