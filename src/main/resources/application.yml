spring:
  datasource:
    url: jdbc:mysql://localhost:3306/assignment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: assignment
    password: assignment
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

scheduling:
  enabled: true

mock-worker:
  base-url: https://dev.realteeth.ai/mock
  candidate-name: ${MOCK_WORKER_CANDIDATE_NAME}
  email: ${MOCK_WORKER_EMAIL}

resilience4j:
  circuitbreaker:
    instances:
      mockWorker:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      mockWorker:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - com.realteeth.assignment.worker.MockWorkerClient$RetryableException
